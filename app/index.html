<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicons and Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Viewport and Mobile Settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    
    <!-- Apple-specific Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Naity" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- App Information -->
    <title>Naity - Hotel Booking Platform</title>
    <meta name="description" content="Naity — منصة حجز الفنادق المباشرة في سوريا. ادفع 10% عربون فقط، والباقي عند الوصول. توفر حقيقي، تأكيد فوري.">
    <meta name="author" content="Naity" />
    <meta name="theme-color" content="#1a56db" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Naity — We Prepare Your Stay" />
    <meta property="og:description" content="Book hotels direct. Pay 10% now, rest on arrival. Instant confirmation." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://naity.net" />
    <meta property="og:site_name" content="Naity" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Naity — We Prepare Your Stay" />
    <meta name="twitter:description" content="Book hotels direct. Pay 10% now, rest on arrival." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Content Security Policy for Mobile Apps -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self' https://api.naity.net https://naity.net;
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https: blob:;
      font-src 'self' data:;
      connect-src 'self' https://api.naity.net http://localhost:3000 capacitor: ionic: file:;
      media-src 'self' https: blob:;
      frame-src 'self';
    " />
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
